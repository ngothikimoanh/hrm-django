{% extends "account/base.html" %}

{% block title %}Edit Profile{% endblock title %}

{% block nav %}
{% include "account/nav.html" with path="account-user-profile" %}
{% endblock nav %}

{% block main %}
<div class="container mt-5 border p-4 rounded bg-body-tertiary" style="max-width: 30rem;">
  <h4 class="text-center">Name</h4>
  <form method="post">
    {% csrf_token %}
    <div class="mb-3">
      <label for="editLastname" class="form-label ">Last Name</label>
      <input type="text" class="form-control" id="editLastname" name="first_name" value="{{user.first_name|default_if_none:'-'}}" required>
    </div>

    <div class="mb-3">
      <label for="editFirstname" class="form-label ">First Name</label>
      <input type="text" class="form-control" id="editFirstname" name="last_name" value="{{user.last_name|default_if_none:'-'}}" required>
    </div>

    <div class="mb-3">
      <label for="editDisplaytname" class="form-label ">Nickname</label>
      <input type="text" class="form-control" id="editDisplaytname" name="username">
    </div>

    <button type="submit" class=" form-control btn btn-primary">Save</button>
  </form>
</div>
{% endblock main %}
