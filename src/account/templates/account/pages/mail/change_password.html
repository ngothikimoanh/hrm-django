<!DOCTYPE html>
<html>

<head>
  <meta charset="UTF-8">
  <style>
    body {
      margin: 0;
      padding: 0;
      background-color: #f2f3f5;
      font-family: Arial, sans-serif;
    }

    .wrapper {
      width: 100%;
      padding: 40px 0;
      text-align: center;
    }

    .logo {
      font-size: 24px;
      font-weight: bold;
      color: #5865F2;
      text-align: center;
      margin-bottom: 20px;
    }

    .container {
      max-width: 600px;
      margin: auto;
      background: #ffffff;
      border-radius: 8px;
      padding: 30px;
      text-align: left;
    }

    h2 {
      color: #2e3338;
      margin-bottom: 20px;
    }

    p {
      color: #4f5660;
      line-height: 1.6;
      margin: 10px 0;
    }

    .link {
      color: #5865F2;
      text-decoration: none;
    }

    .btn {
      display: inline-block;
      margin-top: 25px;
      padding: 12px 20px;
      background-color: #5865F2;
      color: #ffffff !important;
      text-decoration: none;
      border-radius: 5px;
      font-weight: bold;
    }

    .footer {
      margin-top: 30px;
      border-top: 1px solid #e3e5e8;
      padding-top: 15px;
      font-size: 12px;
      color: #99aab5;
      text-align: center;
    }
  </style>
</head>

<body>
  <div class="wrapper">

    <div class="logo">
      OD Human Resources
    </div>

    <div class="container">
      <h2>Hello {{ user.email }},</h2>

      <p>
        Your password has been changed successfully.
      </p>

      <p>
        If you did not perform this action, please contact our support team immediately.
      </p>

      <div style="text-align:center;">
        <a href="{% url 'account-home' %}" class="btn">
          Go to Home
        </a>
      </div>

      <div class="footer">
        © 2026 OD Tech Shop. All rights reserved.
      </div>
    </div>

  </div>
</body>

</html>
